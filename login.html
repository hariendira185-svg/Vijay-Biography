<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- <link rel="stylesheet" href="external.css"> -->
    <style>
        body {
            background: #CC95C0;
            background: -webkit-linear-gradient(to right, #7AA1D2, #DBD4B4, #CC95C0);
            background: linear-gradient(to right, #7AA1D2, #DBD4B4, #CC95C0);
        }
        .parent{
            background-color:transparent;
            width: 300px;
            height: 400px;
            margin: 140px 580px;
            padding: 10px 25px;
            box-shadow: 0px 2px 40px rgba(0,0,0,0.9);
        }
        h1{
            text-align: center;
        }
        .form-field input{
            margin: 10px;
            width: 90%;
            padding: 10px;
            border-radius: 10px;
            display: flex;
        }
        .form-checkbox{
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin: 10px;
                padding: 10px 10px;
            }
        button{
            margin: 10px;
            align-content: center;
            padding: 10px;
            width: 95%;
            border-radius: 10px;
            border: none;
            background-color: aquamarine;
        }
        a{
            text-decoration: none;
        }
        .form-field p{
            text-align: center;
            }
    </style>
</head>

<body>
    
    <form action="Biography_1203.html" class="parent">
        <h1>Login</h1>
        <div class="form-field">
            <label for="email"><b>Email:</b></label>
            <input type="email" name="email" id="email" placeholder="Enter your email" required>
        </div>
        <div class="form-field">
            <label for="password"><b>Password:</b></label>
            <input type="password" name="password" id="password" placeholder="Enter your password" required>
        </div>
        <div class="form-checkbox">
                <div>
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember Me</label>
                </div>
                <a href="#">Forgot Password?</a>
            </div>
        <div class="button">
            <button>Login</button>
        </div>
         <div class="form-field">
                <p>Don't have an account? <a href="">Sign Up</a></p>
            </div>
    </form>
</body>

</html>
